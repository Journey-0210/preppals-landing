<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_preview.css">
<style>
  .alpha-stack { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
  .alpha {
    height: 76px; border-radius: 12px; padding: 10px;
    display: flex; flex-direction: column; justify-content: space-between;
    background: linear-gradient(135deg, #1a2545, #0a1124);
    position: relative;
  }
  .alpha .swatch-fill {
    position: absolute; inset: 10px; border-radius: 8px;
  }
  .alpha .lbl { position: relative; z-index: 1; font-size: 11px; font-weight: 600; }
  .alpha .val { position: relative; z-index: 1; font-family: var(--font-mono); font-size: 10px; color: var(--fg-3); }
</style></head>
<body>
<div class="card">
  <div class="label">Foreground · white-alpha on dark</div>
  <div class="alpha-stack">
    <div class="alpha"><div class="swatch-fill" style="background:rgba(255,255,255,1)"></div><div class="lbl" style="color:#0a1124">fg-1</div><div class="val" style="color:rgba(0,0,0,.5)">100%</div></div>
    <div class="alpha"><div class="swatch-fill" style="background:rgba(255,255,255,.78)"></div><div class="lbl" style="color:#0a1124">fg-2</div><div class="val" style="color:rgba(0,0,0,.5)">78%</div></div>
    <div class="alpha"><div class="swatch-fill" style="background:rgba(255,255,255,.58)"></div><div class="lbl">fg-3</div><div class="val">58%</div></div>
    <div class="alpha"><div class="swatch-fill" style="background:rgba(255,255,255,.38)"></div><div class="lbl">fg-4</div><div class="val">38%</div></div>
  </div>
  <div class="label" style="margin-top:4px">Strokes · hairlines</div>
  <div class="alpha-stack">
    <div class="alpha"><div class="swatch-fill" style="background:rgba(255,255,255,.08); outline:1px solid rgba(255,255,255,.2)"></div><div class="lbl">stroke-1</div><div class="val">8%</div></div>
    <div class="alpha"><div class="swatch-fill" style="background:rgba(255,255,255,.14); outline:1px solid rgba(255,255,255,.2)"></div><div class="lbl">stroke-2</div><div class="val">14%</div></div>
    <div class="alpha"><div class="swatch-fill" style="background:rgba(255,255,255,.22); outline:1px solid rgba(255,255,255,.2)"></div><div class="lbl">stroke-3</div><div class="val">22%</div></div>
    <div class="alpha"><div class="swatch-fill" style="background:rgba(255,101,52,.16); outline:1px solid rgba(255,101,52,.5)"></div><div class="lbl">accent-soft</div><div class="val">16%</div></div>
  </div>
</div>
</body></html>
