<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_preview.css">
<style>
  .sem { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
  .sem-row {
    display: flex; align-items: center; gap: 12px;
    background: var(--bg-surface); border-radius: 12px; padding: 12px 14px;
  }
  .dot { width: 28px; height: 28px; border-radius: 999px; flex: 0 0 28px; }
  .sem-row .nm { font-weight: 600; font-size: 13px; }
  .sem-row .hx { font-family: var(--font-mono); font-size: 11px; color: var(--fg-3); }
</style></head>
<body>
<div class="card">
  <div class="label">Semantic colors</div>
  <div class="sem">
    <div class="sem-row"><div class="dot" style="background:#ff6534"></div><div><div class="nm">accent</div><div class="hx">#FF6534 — CTAs, accent words</div></div></div>
    <div class="sem-row"><div class="dot" style="background:#22c993"></div><div><div class="nm">success</div><div class="hx">#22C993 — confirmation</div></div></div>
    <div class="sem-row"><div class="dot" style="background:#f5b942"></div><div><div class="nm">warning</div><div class="hx">#F5B942 — caution</div></div></div>
    <div class="sem-row"><div class="dot" style="background:#ff5161"></div><div><div class="nm">danger</div><div class="hx">#FF5161 — errors</div></div></div>
    <div class="sem-row"><div class="dot" style="background:#4ea3ff"></div><div><div class="nm">info</div><div class="hx">#4EA3FF — informational</div></div></div>
    <div class="sem-row"><div class="dot" style="background:#0a1124; outline:1px solid rgba(255,255,255,.2)"></div><div><div class="nm">bg-page</div><div class="hx">#0A1124 — page background</div></div></div>
  </div>
</div>
</body></html>
