<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_preview.css">
<style>
  body { padding: 32px 0; display: flex; align-items: center; justify-content: center; }
  .lockup { display: flex; align-items: center; gap: 18px; }
  .lockup img { height: 84px; width: auto; }
  .wordmark { display: flex; flex-direction: column; gap: 2px; line-height: 1; }
  .wordmark .name { font-size: 28px; font-weight: 800; letter-spacing: -0.02em; }
  .wordmark .name .csca { color: var(--fg-3); font-weight: 600; margin-right: 6px; }
  .wordmark .tag { font-size: 11px; color: var(--fg-3); letter-spacing: .04em; }
</style></head>
<body>
  <div class="lockup">
    <img src="../assets/preppals-logo.png" alt="PrepPals">
    <div class="wordmark">
      <div class="name"><span class="csca">CSCA</span>PrepPals</div>
      <div class="tag">Master Today, Excel Tomorrow.</div>
    </div>
  </div>
</body></html>
