<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_preview.css">
<style>
  .scale { display: flex; align-items: flex-end; gap: 12px; }
  .step { display: flex; flex-direction: column; align-items: center; gap: 6px; }
  .step .box { background: var(--orange-500); border-radius: 4px; }
  .step .nm { font-family: var(--font-mono); font-size: 10px; color: var(--fg-3); }
  .step .px { font-family: var(--font-mono); font-size: 10px; color: var(--fg-1); }
</style></head>
<body>
<div class="card">
  <div class="label">Spacing · 4px base · 8/12/16/24/32/48/64/80</div>
  <div class="scale">
    <div class="step"><div class="box" style="width:4px;height:4px"></div><div class="px">4</div><div class="nm">sp-1</div></div>
    <div class="step"><div class="box" style="width:8px;height:8px"></div><div class="px">8</div><div class="nm">sp-2</div></div>
    <div class="step"><div class="box" style="width:12px;height:12px"></div><div class="px">12</div><div class="nm">sp-3</div></div>
    <div class="step"><div class="box" style="width:16px;height:16px"></div><div class="px">16</div><div class="nm">sp-4</div></div>
    <div class="step"><div class="box" style="width:24px;height:24px"></div><div class="px">24</div><div class="nm">sp-6</div></div>
    <div class="step"><div class="box" style="width:32px;height:32px"></div><div class="px">32</div><div class="nm">sp-8</div></div>
    <div class="step"><div class="box" style="width:48px;height:48px"></div><div class="px">48</div><div class="nm">sp-12</div></div>
    <div class="step"><div class="box" style="width:64px;height:64px"></div><div class="px">64</div><div class="nm">sp-16</div></div>
    <div class="step"><div class="box" style="width:80px;height:80px"></div><div class="px">80</div><div class="nm">sp-20</div></div>
  </div>
</div>
</body></html>
