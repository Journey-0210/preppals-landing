<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_preview.css">
<style>
  .stat { display: flex; flex-direction: column; gap: 2px; }
  .stat .num { font-size: 28px; font-weight: 800; color: var(--orange-500); letter-spacing: -0.02em; line-height: 1; }
  .stat .lbl { font-size: 11px; color: var(--fg-3); }
  .strip { display: grid; grid-template-columns: repeat(4, 1fr); gap: 18px; padding: 16px 18px; background: var(--bg-surface); border-radius: 16px; border: 1px solid var(--stroke-1); }
</style></head>
<body>
<div class="card">
  <div class="eyebrow">Eyebrow · 11px / 0.14em / 600 · uppercase</div>
  <div class="label">Stat block (number + descriptor)</div>
  <div class="strip">
    <div class="stat"><div class="num">500+</div><div class="lbl">Students Taught</div></div>
    <div class="stat"><div class="num">4.9 ★</div><div class="lbl">Parent Rating</div></div>
    <div class="stat"><div class="num">5+ Years</div><div class="lbl">Teaching Excellence</div></div>
    <div class="stat"><div class="num">92%</div><div class="lbl">Improved Grades</div></div>
  </div>
</div>
</body></html>
