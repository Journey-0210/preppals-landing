<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_preview.css">
<style>
  .field { display:flex; align-items:center; gap:12px; height:52px; padding: 0 16px; background: var(--bg-field); border-radius: 16px; box-shadow: inset 0 0 0 1px rgba(255,255,255,.08); }
  .field.focused { box-shadow: inset 0 0 0 1px var(--orange-500), 0 0 0 3px rgba(255,101,52,.35); }
  .field.error { box-shadow: inset 0 0 0 1px var(--danger); }
  .field svg { color: var(--orange-500); flex: 0 0 18px; }
  .field input, .field .ph { background: transparent; border: 0; outline: none; color: var(--fg-1); font-family: var(--font-sans); font-size: 14px; flex: 1; }
  .field .ph { color: var(--fg-3); }
  .field .chev { color: var(--fg-3); }
  .row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .err-msg { font-size: 11px; color: var(--danger); margin-top: 4px; }
</style></head>
<body>
<div class="card">
  <div class="label">Form fields · 52h · radius 16 · orange icons + focus</div>
  <div class="row2">
    <div class="field">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
      <span class="ph">Full Name</span>
    </div>
    <div class="field focused">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/></svg>
      <input value="+1 (415) 555-0142" />
    </div>
  </div>
  <div class="field">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="m22 7-10 5L2 7"/></svg>
    <span class="ph">Email Address</span>
    <span class="chev">▾</span>
  </div>
  <div class="row2">
    <div class="field error">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><path d="m4 6 8-3 8 3"/><path d="M4 10v8"/><path d="M20 10v8"/><path d="M2 18h20"/><path d="M14 22v-4a2 2 0 0 0-4 0v4"/></svg>
      <span class="ph">School</span>
    </div>
    <div class="field">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><path d="M3 3v18h18"/><path d="M8 17V9"/><path d="M13 17v-5"/><path d="M18 17v-3"/></svg>
      <span class="ph">Grade / Level</span>
      <span class="chev">▾</span>
    </div>
  </div>
  <div class="err-msg">Please tell us which school you attend.</div>
</div>
</body></html>
